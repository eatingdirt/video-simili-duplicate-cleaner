name: Build MacOS Executable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          brew install qt@6 opencv ffmpeg cmake pkg-config
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> $GITHUB_ENV

      - name: Fix Hardcoded Paths
        run: |
          # This script wipes out the developer's broken paths and replaces them with system links
          sed -i '' 's|set(OPENCV_ROOT.*|find_package(OpenCV REQUIRED)|g' QtProject/CMakeLists.txt
          sed -i '' 's|include_directories(${OPENCV_ROOT}.*|include_directories(${OpenCV_INCLUDE_DIRS})|g' QtProject/CMakeLists.txt
          sed -i '' 's|set(FFMPEG_ROOT.*|find_package(PkgConfig REQUIRED)\npkg_check_modules(FFMPEG REQUIRED libavcodec libavformat libswscale libavutil)|g' QtProject/CMakeLists.txt

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake ../QtProject -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          make -j4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Video-Simili-Cleaner-Mac
          path: build/*.app

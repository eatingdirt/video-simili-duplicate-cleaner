name: Build MacOS Executable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install qt@6 opencv ffmpeg cmake pkg-config
          # Set Qt6 path for the environment
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> $GITHUB_ENV

      - name: Reset CMakeLists.txt
        run: |
          # We are going to force the OpenCV and FFMPEG sections to be clean
          # This deletes the developer's "libraries" folder reference entirely
          cat <<EOF > QtProject/CMakeLists_Mac.cmake
          find_package(OpenCV REQUIRED)
          find_package(PkgConfig REQUIRED)
          pkg_check_modules(FFMPEG REQUIRED libavcodec libavformat libswscale libavutil libswresample)
          include_directories(\${OpenCV_INCLUDE_DIRS} \${FFMPEG_INCLUDE_DIRS})
          target_link_libraries(video-simili-duplicate-cleaner PRIVATE 
              \${OpenCV_LIBS} \${FFMPEG_LIBRARIES}
              bz2 iconv "-framework OpenCL" "-framework Accelerate" 
              "-framework CoreVideo" "-framework Security" 
              "-framework AudioToolbox" "-framework CoreMedia" "-framework VideoToolbox")
          EOF
          
          # Tell the main CMakeLists to use our clean file instead of the messy one
          echo "include(CMakeLists_Mac.cmake)" >> QtProject/CMakeLists.txt

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          cmake ../QtProject -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Video-Simili-Cleaner-Mac
          path: build/*.app

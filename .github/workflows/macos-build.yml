name: Build MacOS Executable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install qt@6 opencv ffmpeg cmake pkg-config
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> $GITHUB_ENV

      - name: Kill Tests and Fix Paths
        run: |
          # 1. Completely remove the tests folder so CMake doesn't try to build it
          rm -rf QtProject/tests
          
          # 2. Force the main CMakeLists to use our clean logic
          cat <<EOF > QtProject/CMakeLists_Mac.cmake
          find_package(OpenCV REQUIRED)
          find_package(PkgConfig REQUIRED)
          pkg_check_modules(FFMPEG REQUIRED libavcodec libavformat libswscale libavutil libswresample)
          include_directories(\${OpenCV_INCLUDE_DIRS} \${FFMPEG_INCLUDE_DIRS})
          target_link_libraries(video-simili-duplicate-cleaner PRIVATE 
              \${OpenCV_LIBS} \${FFMPEG_LIBRARIES}
              bz2 iconv "-framework OpenCL" "-framework Accelerate" 
              "-framework CoreVideo" "-framework Security" 
              "-framework AudioToolbox" "-framework CoreMedia" "-framework VideoToolbox")
          EOF
          
          # 3. Add the include and remove the reference to tests in the main file
          echo "include(CMakeLists_Mac.cmake)" >> QtProject/CMakeLists.txt
          sed -i '' '/add_subdirectory(tests)/d' QtProject/CMakeLists.txt || true

      - name: Configure and Build
        run: |
          mkdir build
          cd build
          # -DBUILD_TESTING=OFF is the standard way to skip tests
          cmake ../QtProject -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          make -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Video-Simili-Cleaner-Mac
          path: build/*.app
